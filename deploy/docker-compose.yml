# Capture pipeline — the VPS needs nothing but Docker.
#
#   nginx     : front door on :2345, buffers requests, samples SAMPLE_PCT% to the
#               Lotus Gateway (rest get 444). Uses host networking so its upstream
#               call to the Gateway rides the host loopback.
#   tcpdump   : passive capture of the captured leg on `lo`, rotating pcaps into
#               ./captures. Copy those to a dev machine and run `mise run pcap-convert`.
#
# Start:   docker compose up -d --build
# Tune %:  edit SAMPLE_PCT (e.g. 100 for everything), then `docker compose up -d`.
#
# Capture leg (CAP_PORT):
#   - in front of the Gateway (default): set CAP_PORT = GATEWAY_PORT  -> nginx<->Gateway
#     (original method names like eth_call + responses; best match to existing parquet)
#   - Gateway<->Forest: set CAP_PORT = Forest's port

services:
  nginx:
    image: nginx:1.27-alpine
    network_mode: host
    environment:
      LISTEN_PORT: "2345"          # where producers connect (was mitmdump)
      GATEWAY_HOST: "127.0.0.1"
      GATEWAY_PORT: "3456"         # Lotus Gateway listen port
      SAMPLE_PCT: "50"             # % forwarded to the Gateway; rest closed (444)
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped

  tcpdump:
    build:
      context: .
      dockerfile: Dockerfile.tcpdump
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      CAP_IFACE: "lo"
      CAP_PORT: "3456"             # = GATEWAY_PORT (front-of-Gateway) or Forest's port
    volumes:
      - ./captures:/captures
    # rotate hourly into timestamped files; -s 0 = full payload (needed to recover bodies).
    # No -W: with -G, -W makes tcpdump *exit* at the limit (not overwrite), and combined
    # with -C it is ignored — either way it can't bound disk here. The pcap-prune sidecar
    # enforces the total-size cap instead.
    # $$ escapes compose interpolation so the shell expands the env vars at runtime.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        exec tcpdump -i "$$CAP_IFACE" -s 0
        -w /captures/cap-%Y%m%d-%H%M%S.pcap -G 3600
        "tcp port $$CAP_PORT"
    restart: unless-stopped

  # Keeps ./captures under MAX_GB (GiB): every INTERVAL seconds, delete the oldest
  # *.pcap until total usage is back under budget. Never deletes the last remaining
  # file (tcpdump is actively writing it). No network needed — only the volume.
  pcap-prune:
    image: alpine:3.20
    environment:
      MAX_GB: "200"                # total-size budget for ./captures, in GiB
      INTERVAL: "300"              # seconds between sweeps
    volumes:
      - ./captures:/captures
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        MAX_KIB=$$(( MAX_GB * 1024 * 1024 ));
        while true; do
          while [ "$$(du -sk /captures 2>/dev/null | cut -f1)" -gt "$$MAX_KIB" ]; do
            n=$$(ls -1 /captures/*.pcap 2>/dev/null | wc -l);
            [ "$$n" -le 1 ] && break;
            oldest=$$(ls -1tr /captures/*.pcap 2>/dev/null | head -n1);
            [ -z "$$oldest" ] && break;
            echo "pcap-prune: over $${MAX_GB}GiB, removing $$oldest";
            rm -f "$$oldest";
          done;
          sleep "$$INTERVAL";
        done
    restart: unless-stopped
