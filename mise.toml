[tools]
python = "3.13"
uv = "latest"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.install]
description = "Install Python deps"
run = "uv pip install mitmproxy pyarrow polars brotli zstandard altair vl-convert-python pandas pytest"

[tasks.test]
description = "Run the test suite"
depends = ["install"]
run = "python -m pytest test_flows_to_parquet.py"


